name: Release

# Runs on every push to main.
# - Pending changesets present  → opens/updates a "Version Packages" PR
# - "Version Packages" PR merged → generates, builds, and publishes all packages
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so the changeset-release branch is pushed as a real user, which
          # lets the version PR be created even when the org blocks Actions from it.
          token: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com/
          scope: '@fluixi'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # The `generate` step takes ~35 min; everything else here is seconds.
      # Cache its output (the generated TS modules) keyed on the generator
      # scripts + lockfile, so we only pay that cost when the generators change.
      # To force a fresh upstream re-fetch, bump the `v1` in the key below.
      - name: Cache generated icon modules
        id: icons-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/icons/*/src/icons
            packages/icons/*/src/all.ts
          key: gen-icons-v1-${{ hashFiles('scripts/**', 'pnpm-lock.yaml') }}

      - name: Fetch icon repos
        run: pnpm run fetch:icons

      - name: Copy SVGs to packages
        run: pnpm copy-icons

      - name: Generate icon modules
        if: steps.icons-cache.outputs.cache-hit != 'true'
        run: pnpm generate
        timeout-minutes: 45

      - name: Generate SVG sprites
        run: pnpm sprites

      - name: Create version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

