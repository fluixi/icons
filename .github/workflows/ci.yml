name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Generate & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # All @fluixi packages resolve from public npm — no registry auth needed.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Shares the same key as release.yml, so the ~35-min generation runs once
      # and both workflows reuse it until the generator scripts or deps change.
      - name: Cache generated icon modules
        id: icons-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/icons/*/src/icons
            packages/icons/*/src/all.ts
          key: gen-icons-v1-${{ hashFiles('scripts/**', 'pnpm-lock.yaml') }}

      - name: Fetch icon repos
        run: pnpm run fetch:icons

      - name: Copy SVGs to packages
        run: pnpm copy-icons

      - name: Generate icon modules
        if: steps.icons-cache.outputs.cache-hit != 'true'
        run: pnpm generate
        timeout-minutes: 45

      - name: Generate SVG sprites
        run: pnpm sprites

      - name: Build packages
        run: pnpm build
        env:
          NODE_ENV: production
        timeout-minutes: 30
