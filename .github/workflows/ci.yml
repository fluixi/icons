name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Generate & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com/
          scope: '@fluixi'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch icon repos
        run: pnpm run fetch:icons

      - name: Copy SVGs to packages
        run: pnpm copy-icons

      - name: Generate icon modules
        run: pnpm generate
        timeout-minutes: 45

      - name: Generate SVG sprites
        run: pnpm sprites

      - name: Build packages
        run: pnpm build
        env:
          NODE_ENV: production
        timeout-minutes: 30
